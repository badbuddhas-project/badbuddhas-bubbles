<body>

<div class="page-header">
  <h1>[ bubbles ] — финальная визуальная система</h1>
  <p>Slow = Flower Bloom (2) · Ground = Organic Circle · Rise = Flower Bloom (6+)</p>
</div>

  <button class="tab" onclick="showScreen('player')">Плеер</button>

<script>
const COLORS={relax:{r:139,g:92,b:246},balance:{r:59,g:130,b:246},energize:{r:236,g:72,b:153}};
const CAT_HEX={relax:'#8b5cf6',balance:'#3b82f6',energize:'#ec4899'};
const CAT_LABEL={relax:'Slow',balance:'Ground',energize:'Rise'};

const PRACTICES=[
  {id:1,name:'Exhale',category:'relax',duration:'14 мин',instructor:'Даша Чен'},
  {id:2,name:'Wind Down',category:'balance',duration:'15 мин',instructor:'Светлана'},
  {id:3,name:'Activate',category:'energize',duration:'6 мин',instructor:'Даша Чен'},
];
const LOCKED=[{id:4,category:'relax'},{id:5,category:'energize'}];
const TEACHERS=[{name:'Даша',count:12,category:'relax',seed:42},{name:'Света',count:8,category:'balance',seed:77},{name:'Максим',count:6,category:'energize',seed:13},{name:'Аня',count:5,category:'relax',seed:99}];

let currentScreen='home';
const items=[];

function rgba(c,a){return`rgba(${c.r},${c.g},${c.b},${Math.min(a,1)})`}
function seededRng(s){let v=s;return()=>{v=(v*16807)%2147483647;return(v-1)/2147483646}}

function drawTintedBg(ctx,W,H,color){
  ctx.fillStyle='#060608';ctx.fillRect(0,0,W,H);
  const g=ctx.createRadialGradient(W/2,H/2,0,W/2,H/2,Math.max(W,H)*0.5);
  g.addColorStop(0,rgba(color,0.06));g.addColorStop(1,'rgba(0,0,0,0)');
  ctx.fillStyle=g;ctx.fillRect(0,0,W,H);
}

function drawBubbles(ctx,W,H,color,seed,T,count){
  const rng=seededRng(seed+999);
  for(let i=0;i<count;i++){
    const bx=rng()*W,by=rng()*H,br=Math.min(W,H)*(0.02+rng()*0.05);
    const ph=rng()*Math.PI*2;
    const ax=bx+Math.sin(T*0.2+ph)*W*0.02,ay=by+Math.cos(T*0.15+ph*1.2)*H*0.015;
    const ba=(0.2+rng()*0.35)*(0.85+0.15*Math.sin(T*0.3+ph));
    ctx.beginPath();ctx.arc(ax,ay,br,0,Math.PI*2);
    ctx.fillStyle=rgba(color,ba*0.08);ctx.fill();
    ctx.strokeStyle=rgba(color,ba*0.6);ctx.lineWidth=Math.min(W,H)*0.004;ctx.stroke();
  }
}

// ===== FLOWER BLOOM =====
// petals: number of circles around center (2 for Slow, 6 for Rise)
function drawFlowerBloom(ctx,W,H,color,petals,seed,T){
  ctx.clearRect(0,0,W,H);drawTintedBg(ctx,W,H,color);
  const cx=W/2,cy=H/2,S=Math.min(W,H);
  const R=S*0.22;
  const breathe=1+0.06*Math.sin(T*0.4);
  const rot=T*0.08;

  ctx.save();ctx.translate(cx,cy);ctx.rotate(rot);

  const cr=R*breathe;
  // Center circle
  ctx.beginPath();ctx.arc(0,0,cr,0,Math.PI*2);
  ctx.strokeStyle=rgba(color,0.12);ctx.lineWidth=S*0.02;ctx.stroke();
  ctx.beginPath();ctx.arc(0,0,cr,0,Math.PI*2);
  ctx.strokeStyle=rgba(color,0.7);ctx.lineWidth=S*0.008;ctx.stroke();

  // Petal circles
  for(let i=0;i<petals;i++){
    const a=(i/petals)*Math.PI*2;
    const px=Math.cos(a)*cr,py=Math.sin(a)*cr;
    const pa=0.5+0.15*Math.sin(T*0.3+i*0.7);
    ctx.beginPath();ctx.arc(px,py,cr,0,Math.PI*2);
    ctx.strokeStyle=rgba(color,pa*0.12);ctx.lineWidth=S*0.018;ctx.stroke();
    ctx.beginPath();ctx.arc(px,py,cr,0,Math.PI*2);
    ctx.strokeStyle=rgba(color,pa);ctx.lineWidth=S*0.007;ctx.stroke();
  }

  // Second ring for 6+ petals (Rise)
  if(petals>=6){
    for(let i=0;i<6;i++){
      const a=(i/6)*Math.PI*2+Math.PI/6;
      const px=Math.cos(a)*cr*1.72*0.58,py=Math.sin(a)*cr*1.72*0.58;
      const pa=0.3+0.1*Math.sin(T*0.35+i);
      ctx.beginPath();ctx.arc(px,py,cr,0,Math.PI*2);
      ctx.strokeStyle=rgba(color,pa*0.1);ctx.lineWidth=S*0.012;ctx.stroke();
      ctx.beginPath();ctx.arc(px,py,cr,0,Math.PI*2);
      ctx.strokeStyle=rgba(color,pa);ctx.lineWidth=S*0.005;ctx.stroke();
    }
  }

  // Center dot
  ctx.beginPath();ctx.arc(0,0,S*0.018,0,Math.PI*2);
  ctx.fillStyle=rgba(color,0.85);ctx.fill();
  ctx.restore();
  drawBubbles(ctx,W,H,color,seed,T,3);
}

// ===== ORGANIC CIRCLE =====
function drawOrganicCircle(ctx,W,H,color,seed,T){
  ctx.clearRect(0,0,W,H);drawTintedBg(ctx,W,H,color);
  const cx=W/2,cy=H/2,S=Math.min(W,H);
  const R=S*0.32;
  const layers=[
    {r:1,wobbleCount:6,wobbleAmt:0.07,alpha:0.85,w:0.012,off:0},
    {r:0.75,wobbleCount:8,wobbleAmt:0.05,alpha:0.5,w:0.008,off:100},
    {r:0.55,wobbleCount:5,wobbleAmt:0.09,alpha:0.3,w:0.006,off:200},
  ];
  for(const layer of layers){
    const r=R*layer.r*(1+0.06*Math.sin(T*(0.3+layer.off*0.001)));
    const rng=seededRng(seed+layer.off);
    const wobbles=[];for(let i=0;i<layer.wobbleCount;i++)wobbles.push((rng()-0.5)*2);
    ctx.beginPath();
    for(let i=0;i<=150;i++){
      const t=i/150,a=t*Math.PI*2;
      let wobble=0;
      for(let w=0;w<layer.wobbleCount;w++)wobble+=wobbles[w]*Math.sin(a*(w+1)+T*(0.15+w*0.04))*layer.wobbleAmt;
      const rr=r*(1+wobble);
      const x=cx+Math.cos(a)*rr,y=cy+Math.sin(a)*rr;
      i===0?ctx.moveTo(x,y):ctx.lineTo(x,y);
    }
    ctx.closePath();
    ctx.strokeStyle=rgba(color,layer.alpha*0.12);ctx.lineWidth=S*0.025;ctx.stroke();
    ctx.strokeStyle=rgba(color,layer.alpha*0.9);ctx.lineWidth=S*layer.w;ctx.stroke();
  }
  const cg=ctx.createRadialGradient(cx,cy,0,cx,cy,R*0.12);
  cg.addColorStop(0,rgba(color,0.35));cg.addColorStop(1,'rgba(0,0,0,0)');
  ctx.fillStyle=cg;ctx.beginPath();ctx.arc(cx,cy,R*0.12,0,Math.PI*2);ctx.fill();
  drawBubbles(ctx,W,H,color,seed,T,3);
}

// ===== CATEGORY → DRAW FUNCTION =====
function drawForCategory(ctx,W,H,category,seed,T){
  const color=COLORS[category]||COLORS.relax;
  if(category==='relax') drawFlowerBloom(ctx,W,H,color,1,seed,T);
  else if(category==='balance') drawOrganicCircle(ctx,W,H,color,seed,T);
  else drawFlowerBloom(ctx,W,H,color,6,seed,T);
}

// ===== PLAYER ORGANIC CIRCLE (large, breathing) =====
function drawPlayerVisual(ctx,W,H,color,seed,T){
  ctx.clearRect(0,0,W,H);
  ctx.fillStyle='#030308';ctx.fillRect(0,0,W,H);
  const bg=ctx.createRadialGradient(W/2,H*0.42,0,W/2,H*0.42,H*0.45);
  bg.addColorStop(0,rgba(color,0.06));bg.addColorStop(1,'rgba(0,0,0,0)');
  ctx.fillStyle=bg;ctx.fillRect(0,0,W,H);

  const cx=W/2,cy=H*0.42,S=Math.min(W,H*0.5);
  const breathCycle=T*0.125;
  const breathPhase=breathCycle%1;
  const seg=Math.floor(breathPhase*4);
  const prog=(breathPhase*4)%1;
  const ease=prog*prog*(3-2*prog);
  let breathScale;
  if(seg===0)breathScale=1+0.12*ease;
  else if(seg===1)breathScale=1.12;
  else if(seg===2)breathScale=1.12-0.12*ease;
  else breathScale=1;

  const layers=[
    {R:S*0.36,wobbleCount:6,wobbleAmt:0.07,alpha:0.85,width:0.012,off:0},
    {R:S*0.28,wobbleCount:8,wobbleAmt:0.05,alpha:0.5,width:0.008,off:100},
    {R:S*0.19,wobbleCount:5,wobbleAmt:0.09,alpha:0.3,width:0.006,off:200},
  ];
  for(const layer of layers){
    const r=layer.R*breathScale;
    const rng=seededRng(seed+layer.off);
    const wobbles=[];for(let i=0;i<layer.wobbleCount;i++)wobbles.push((rng()-0.5)*2);
    ctx.beginPath();
    for(let i=0;i<=150;i++){
      const t=i/150,a=t*Math.PI*2;
      let wobble=0;
      for(let w=0;w<layer.wobbleCount;w++)wobble+=wobbles[w]*Math.sin(a*(w+1)+T*(0.15+w*0.04))*layer.wobbleAmt;
      const rr=r*(1+wobble);
      const x=cx+Math.cos(a)*rr,y=cy+Math.sin(a)*rr;
      i===0?ctx.moveTo(x,y):ctx.lineTo(x,y);
    }
    ctx.closePath();
    ctx.strokeStyle=rgba(color,layer.alpha*0.15);ctx.lineWidth=S*0.03;ctx.stroke();
    ctx.strokeStyle=rgba(color,layer.alpha);ctx.lineWidth=S*layer.width;ctx.stroke();
  }
  const coreR=S*0.08*breathScale;
  const cg=ctx.createRadialGradient(cx,cy,0,cx,cy,coreR);
  cg.addColorStop(0,rgba(color,0.2+0.15*breathScale));cg.addColorStop(1,'rgba(0,0,0,0)');
  ctx.fillStyle=cg;ctx.beginPath();ctx.arc(cx,cy,coreR,0,Math.PI*2);ctx.fill();

  const rng=seededRng(seed+500);
  for(let i=0;i<6;i++){
    const bx=rng()*W,by=rng()*H*0.7+H*0.1,br=S*(0.012+rng()*0.025);
    const ph=rng()*Math.PI*2;
    const ax=bx+Math.sin(T*0.2+ph)*W*0.015,ay=by+Math.cos(T*0.15+ph*1.2)*H*0.01;
    const ba=(0.15+rng()*0.2)*(0.85+0.15*Math.sin(T*0.3+ph));
    ctx.beginPath();ctx.arc(ax,ay,br,0,Math.PI*2);
    ctx.fillStyle=rgba(color,ba*0.06);ctx.fill();
    ctx.strokeStyle=rgba(color,ba*0.5);ctx.lineWidth=1.5;ctx.stroke();
  }
}

// ===== ICONS =====
const LOCK_SVG=`<svg class="lock-svg" viewBox="0 0 24 24" fill="none" stroke="#C034A5" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0110 0v4"/></svg>`;
const PLAY_TRI=`<svg width="12" height="12" viewBox="0 0 12 14" fill="white"><path d="M1 1.5l10 5-10 5V1.5z"/></svg>`;
const USER_SVG=`<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#666" stroke-width="1.8"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>`;
const BRAND_SVG=`<svg width="16" height="16" viewBox="0 0 110 116" fill="none"><path d="M55 2L2 30v56l53 28 53-28V30L55 2z" stroke="#CBCBCB" stroke-width="5"/><path d="M55 30L30 44v28l25 14 25-14V44L55 30z" stroke="#CBCBCB" stroke-width="4"/></svg>`;

function cid(b,i){return`cv-${b}-${i}`}

// ===== BUILD HOME =====
function buildHome(){
  let h=`<div class="app"><div class="app-header"><div class="brand">${BRAND_SVG}<span class="brand-name">badbuddhas</span></div><div style="display:flex;align-items:center"><span class="greet">Привет, дышатель</span><div class="avatar-btn">${USER_SVG}</div></div></div>`;
  h+=`<div class="hero-card"><div class="hero-info"><div class="hero-label" style="color:#ec4899">НОВАЯ ПРАКТИКА</div><div class="hero-title">Activate</div><div class="hero-meta">с Дашей Чен · 6 мин</div><button class="hero-btn">${PLAY_TRI} Дышать</button></div><canvas id="${cid('h',0)}" width="224" height="224" style="width:112px;height:112px;border-radius:22px;flex-shrink:0"></canvas></div>`;
  h+=`<div class="hero-dots"><div class="hero-dot active"></div><div class="hero-dot"></div><div class="hero-dot"></div></div>`;
  h+=`<div class="section" style="margin-top:22px"><div class="section-hdr"><span class="section-title">Практики</span><button class="section-all">ВСЕ →</button></div><div class="practice-cards">`;
  PRACTICES.forEach((p,i)=>{h+=`<div class="pcard"><canvas id="${cid('p',i)}" width="300" height="300" style="width:150px;height:150px"></canvas><div class="pcard-play">${PLAY_TRI}</div><div class="pcard-overlay"></div><div class="pcard-info"><div class="pcard-cat" style="color:${CAT_HEX[p.category]}">${CAT_LABEL[p.category]}</div><div class="pcard-name">${p.name}</div><div class="pcard-dur">${p.duration}</div></div></div>`});
  h+=`</div></div>`;
  h+=`<div class="black-cta"><div class="black-cta-bg"></div><div class="black-cta-glow1"></div><div class="black-cta-glow2"></div><div class="black-cta-inner"><div class="black-cta-row"><div><div class="black-badge"><span>BLACK</span></div><div class="black-cta-title">Ещё 6+ практик</div><div class="black-cta-desc">Живые сессии, теория и эксклюзивный контент</div></div><div class="black-locked">`;
  LOCKED.forEach((p,i)=>{h+=`<div class="black-locked-item"><canvas id="${cid('l',i)}" width="96" height="96" style="width:48px;height:48px"></canvas><div class="black-locked-lock">${LOCK_SVG}</div></div>`});
  h+=`</div></div><button class="black-cta-btn">Открыть [black]</button></div></div>`;
  h+=`<div class="section"><div class="section-hdr"><span class="section-title">Преподаватели</span><button class="section-all">ВСЕ →</button></div><div class="teachers-row">`;
  TEACHERS.forEach((t,i)=>{const lk=i>0;h+=`<div class="teacher"${lk?' style="opacity:0.3"':''}><div class="teacher-img"><canvas id="${cid('t',i)}" width="160" height="160" style="width:80px;height:80px;${lk?'filter:grayscale(100%) brightness(0.5)':''}"></canvas><div class="teacher-img-overlay"></div><div class="teacher-name-overlay">${t.name}</div>${lk?`<div style="position:absolute;inset:0;display:flex;align-items:center;justify-content:center">${LOCK_SVG}</div>`:''}</div><div class="teacher-count">♪ ${t.count}</div></div>`});
  h+=`</div></div></div>`;
  return h;
}

// ===== BUILD PLAYER =====

  return `<div class="player">
    <canvas id="player-cv" width="750" height="1440"></canvas>
    <div class="player-grain"></div>
    <div class="player-top">
      <div><div class="player-title">Wind Down</div><div class="player-sub">Светлана</div><div class="player-dur">15 мин · Ground</div></div>
      <button class="player-close" onclick="showScreen('home')"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="rgba(255,255,255,0.5)" stroke-width="1.5"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button>
    </div>
    <div class="player-bottom">
      <div class="progress-bar"><div class="progress-fill" style="width:12%"></div></div>
      <div class="timer-row"><span class="timer-text">0:08</span><span class="timer-text">15:00</span></div>
      <div class="controls-row">
        <button class="ctrl-btn"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="rgba(255,255,255,0.45)" stroke-width="1.5"><path d="M1 4v6h6"/><path d="M3.51 15a9 9 0 102.13-9.36L1 10"/></svg><span class="ctrl-label">10</span></button>
        <button class="play-btn"><svg width="18" height="18" viewBox="0 0 24 24" fill="rgba(255,255,255,0.8)"><path d="M5 3l14 9-14 9V3z"/></svg></button>
        <button class="ctrl-btn"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="rgba(255,255,255,0.45)" stroke-width="1.5"><path d="M23 4v6h-6"/><path d="M20.49 15a9 9 0 11-2.12-9.36L23 10"/></svg><span class="ctrl-label">10</span></button>
        <button class="ctrl-btn"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="rgba(255,255,255,0.45)" stroke-width="1.5"><path d="M20.84 4.61a5.5 5.5 0 00-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 00-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 000-7.78z"/></svg></button>
        <button class="ctrl-btn"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="rgba(255,255,255,0.45)" stroke-width="1.5"><path d="M4 12v8a2 2 0 002 2h12a2 2 0 002-2v-8"/><polyline points="16 6 12 2 8 6"/><line x1="12" y1="2" x2="12" y2="15"/></svg></button>
      </div>
    </div>
  </div>`;
}

// ===== RENDER =====
function showScreen(s){
  currentScreen=s;
  document.querySelectorAll('.tab').forEach((t,i)=>t.classList.toggle('active',i===(s==='home'?0:1)));
  render();
}

function render(){
  const c=document.getElementById('container');
  items.length=0;
  if(currentScreen==='home'){
    c.innerHTML=`<div class="dir-label"><h2>Главная</h2><p>Slow → Flower Bloom (2) · Ground → Organic Circle · Rise → Flower Bloom (full)</p></div><div class="phone-frame"><div class="phone-scroll">${buildHome()}</div></div>`;
    const add=(id,W,H,cat,seed)=>{const el=document.getElementById(id);if(el)items.push({el,W,H,cat,seed,type:'cat'})};
    add(cid('h',0),224,224,'energize',42);
    PRACTICES.forEach((p,i)=>add(cid('p',i),300,300,p.category,10+i*31));
    LOCKED.forEach((p,i)=>add(cid('l',i),96,96,p.category,50+i*23));
    TEACHERS.forEach((t,i)=>add(cid('t',i),160,160,t.category,t.seed));
  } else {
    c.innerHTML=`<div class="dir-label"><h2>Плеер — Wind Down</h2><p>Ground · Organic Circle · дышащая анимация</p></div><div class="phone-frame">${buildPlayer()}</div>`;
    const el=document.getElementById('player-cv');
    if(el)items.push({el,W:750,H:1440,cat:'balance',seed:77,type:'player'});
  }
}

function animate(ts){
  const T=ts*0.001;
  for(const it of items){
    const ctx=it.el.getContext('2d');
    if(!ctx)continue;
    if(it.type==='player') drawPlayerVisual(ctx,it.W,it.H,COLORS[it.cat],it.seed,T);
    else drawForCategory(ctx,it.W,it.H,it.cat,it.seed,T);
  }
  requestAnimationFrame(animate);
}

render();
requestAnimationFrame(animate);
</script>
</body>
</html>
