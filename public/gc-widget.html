<!DOCTYPE html>
<html lang="ru">
<head>

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #0A0A0A; min-height: 100vh; display: flex; justify-content: center; padding: 16px; }

  <script>
    var observer = new MutationObserver(function() {
      var emailInput = document.querySelector('input[type="email"], input[name="email"]');
      if (emailInput && !emailInput._tracked) {
        emailInput._tracked = true;
        emailInput.addEventListener('input', function() {
          if (emailInput.value && emailInput.value.includes('@')) {
            window.parent.postMessage({ type: 'gc-email', email: emailInput.value }, '*');
          }
        });
        if (emailInput.value && emailInput.value.includes('@')) {
          window.parent.postMessage({ type: 'gc-email', email: emailInput.value }, '*');
        }
      }
      var text = document.body.innerText || '';
      if (text.indexOf('спасибо') !== -1 || text.indexOf('Спасибо') !== -1 || text.indexOf('Добро пожаловать') !== -1) {
        window.parent.postMessage({ type: 'gc-payment-complete' }, '*');
      }
    });
    observer.observe(document.body, { childList: true, subtree: true });
  </script>
</body>
</html>
